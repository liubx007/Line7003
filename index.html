<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line 7003 Pole Inspection Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #2c3e50;
            --primary: #3498db;
            --primary-hover: #2980b9;
            --border-color: #e0e6ed;
            --shadow: rgba(0, 0, 0, 0.08);
        }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; background-color: #f8f9fa; color: var(--text-color); overflow: hidden; }
        
        /* --- Login Overlay Styling --- */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #f8f9fa; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
            width: 300px; border: 1px solid var(--border-color);
        }
        .login-box h3 { margin-top: 0; color: var(--text-color); margin-bottom: 20px; font-size: 22px; }
        .login-box input {
            width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc;
            border-radius: 6px; font-size: 16px; box-sizing: border-box; outline: none;
        }
        .login-box input:focus { border-color: var(--primary); }
        .error-msg { color: #e74c3c; font-size: 13px; margin-bottom: 15px; display: none; }
        .login-box .btn { width: 100%; justify-content: center; padding: 10px; font-size: 16px; }

        /* Main Dashboard (Hidden initially) */
        #mainDashboard { display: none; flex-direction: column; height: 100%; width: 100%; }

        /* Header Styling */
        #header { padding: 15px 25px; background-color: var(--bg-color); display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); box-shadow: 0 4px 15px var(--shadow); z-index: 1000; gap: 15px;}
        .header-title { margin: 0; font-size: 20px; font-weight: 600; color: var(--text-color); display: flex; align-items: center; gap: 10px; }
        
        /* Control Panel Styling */
        .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 20px; font-size: 13px; }
        .control-group { display: flex; align-items: center; gap: 8px; background: #f8f9fa; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border-color); }
        select { padding: 4px 8px; font-size: 13px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer; outline: none; background: white; }
        
        /* Range Sliders */
        .slider-container { display: flex; flex-direction: column; gap: 4px; }
        .slider-row { display: flex; align-items: center; gap: 8px; }
        input[type="range"] { cursor: pointer; accent-color: var(--primary); width: 100px; }
        .pcf-display { display: inline-block; width: 30px; font-weight: 600; color: var(--primary); text-align: right; }
        
        /* Buttons */
        .btn { background-color: var(--primary); color: white; border: none; padding: 8px 14px; border-radius: 6px; font-weight: 500; font-size: 13px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 5px; box-shadow: 0 2px 4px rgba(52, 152, 219, 0.3); }
        .btn:hover { background-color: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 8px rgba(52, 152, 219, 0.4); }
        .btn:active { transform: translateY(0); }
        .btn-toggle { background-color: #fff; color: var(--text-color); border: 1px solid var(--border-color); box-shadow: none; }
        .btn-toggle:hover { background-color: #f1f2f6; }
        .btn-toggle.active { background-color: #fff3e0; border-color: #ff9800; color: #e65100; box-shadow: 0 2px 8px rgba(255, 152, 0, 0.2); }
        
        /* Map Container */
        #map { flex: 1; width: 100%; }
        
        /* Popup Styling */
        .leaflet-popup-content-wrapper { border-radius: 8px; box-shadow: 0 6px 20px rgba(0,0,0,0.15); border: 1px solid rgba(0,0,0,0.05); }
        .popup-content { font-size: 13px; line-height: 1.6; color: #444; min-width: 170px; }
        .popup-header { border-bottom: 1px solid #eee; padding-bottom: 6px; margin-bottom: 6px; font-weight: 600; color: var(--text-color); font-size: 14px; }
        .highlight { color: #e74c3c; font-weight: bold; font-size: 14px;}
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h3>🔒 Access Required</h3>
            <input type="password" id="passwordInput" placeholder="Enter Password">
            <div id="errorMsg" class="error-msg">Incorrect password. Please try again.</div>
            <button class="btn" id="loginBtn">Enter Dashboard</button>
        </div>
    </div>

    <div id="mainDashboard">
        <div id="header">
            <h2 class="header-title">🌲 Line 7003 Inspection</h2>
            
            <div class="controls">
                <div class="control-group">
                    <label for="speciesFilter"><strong>Species:</strong></label>
                    <select id="speciesFilter">
                        <option value="ALL">All</option>
                        <option value="Red Pine">Red Pine</option>
                        <option value="West Red Cedar">West Red Cedar</option>
                        <option value="South Yellow Pine">South Yellow Pine</option>
                        <option value="D.Fir">D.Fir</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="control-group slider-container">
                    <div class="slider-row">
                        <label><strong>Min:</strong></label>
                        <input type="range" id="pcfMin" min="0" max="1.0" step="0.01" value="0">
                        <span class="pcf-display" id="pcfMinValue">0.00</span>
                    </div>
                    <div class="slider-row">
                        <label><strong>Max:</strong></label>
                        <input type="range" id="pcfMax" min="0" max="1.5" step="0.01" value="1.50">
                        <span class="pcf-display" id="pcfMaxValue">1.50</span>
                    </div>
                </div>

                <button class="btn btn-toggle" id="colorToggleBtn">🎨 Color by PCF</button>
                <button class="btn" id="locationBtn">📍 My Location</button>
                <button class="btn" id="exportBtn">📥 Export CSV</button>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <script>
        // ==========================================
        // 🔒 在这里设置你的网页访问密码！
        const CORRECT_PASSWORD = "7003"; 
        // ==========================================

        const loginOverlay = document.getElementById('loginOverlay');
        const mainDashboard = document.getElementById('mainDashboard');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');

        // 登录逻辑
        function attemptLogin() {
            if (passwordInput.value === CORRECT_PASSWORD) {
                loginOverlay.style.display = 'none';
                mainDashboard.style.display = 'flex';
                initializeDashboard(); // 密码正确后才开始加载地图和数据
            } else {
                errorMsg.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        loginBtn.addEventListener('click', attemptLogin);
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') attemptLogin();
        });

        // 核心变量
        let map, markersLayer, userLocationMarker;
        let allData = [];
        let filteredDataForExport = [];
        let isColorGradientMode = false;

        // 初始化主界面
        function initializeDashboard() {
            // 初始化地图
            map = L.map('map').setView([45.5, -62.0], 9);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);

            markersLayer = L.layerGroup().addTo(map);
            loadData(); // 开始读取CSV
            setupEventListeners();
        }

        // 坐标清理
        function cleanCoord(coordStr) {
            if (!coordStr) return null;
            let str = String(coordStr).toUpperCase().trim();
            let mult = (str.includes('S') || str.includes('W')) ? -1 : 1;
            let match = str.match(/-?\d+\.\d+/);
            if (match) {
                let val = parseFloat(match[0]);
                if (val > 0 && mult === -1) val = val * -1;
                return val;
            }
            return null;
        }

        // 树种标准化
        function standardizeSpecies(rawSpecies) {
            if (!rawSpecies) return 'Other';
            let s = rawSpecies.trim().toUpperCase();
            if (['RD', 'RP', 'D', 'RED PINE'].includes(s)) return 'Red Pine';
            if (['WRC', 'WRC?', 'CEDER', 'CEDAR'].includes(s)) return 'West Red Cedar';
            if (['YP', 'SYP', 'SOUTH YELLOW PINE'].includes(s)) return 'South Yellow Pine';
            if (['DF', 'D.FIR'].includes(s)) return 'D.Fir';
            return 'Other';
        }

        // 浓度渐变色算法
        function getMarkerColor(pcf) {
            if (!isColorGradientMode) return "#3498db"; 
            if (pcf <= 0) return "#bdc3c7"; 
            let ratio = Math.min(pcf, 0.5) / 0.5;
            let hue = 60 - (ratio * 60);
            return `hsl(${hue}, 100%, 50%)`;
        }

        // 读取并处理数据
        function loadData() {
            Papa.parse("Line 7003 Final Data.csv", {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    let rawData = results.data;
                    let ref324_2_Lat = null; let ref324_2_Lon = null;

                    rawData.forEach(row => {
                        if (String(row['Structure Number1']).trim() === '324 (2)') {
                            ref324_2_Lat = row['GPS Lat']; ref324_2_Lon = row['GPS Long'];
                        }
                    });

                    let coordOccurrences = {}; 

                    rawData.forEach(row => {
                        let structNum = String(row['Structure Number1']).trim();
                        if (structNum === '324 (3)' && ref324_2_Lat) {
                            row['GPS Lat'] = ref324_2_Lat; row['GPS Long'] = ref324_2_Lon;
                        }

                        let lat = cleanCoord(row['GPS Lat']);
                        let lon = cleanCoord(row['GPS Long']);
                        
                        let pcfStr = row['Sawdust Progrqm PCF'];
                        let pcfValue = 0;
                        if (pcfStr) {
                            let parsed = parseFloat(String(pcfStr).replace(/[^0-9.-]/g, ''));
                            if (!isNaN(parsed)) pcfValue = parsed;
                        }

                        if (lat !== null && lon !== null) {
                            let coordKey = `${lat.toFixed(5)},${lon.toFixed(5)}`;
                            if (coordOccurrences[coordKey] !== undefined) {
                                coordOccurrences[coordKey]++;
                                lat += 0.00005 * coordOccurrences[coordKey]; 
                                lon += 0.00005 * coordOccurrences[coordKey];
                            } else {
                                coordOccurrences[coordKey] = 0;
                            }

                            row.cleanLat = lat;
                            row.cleanLon = lon;
                            row.stdSpecies = standardizeSpecies(row['Wood Species2']);
                            row.pcfValue = pcfValue;
                            allData.push(row);
                        }
                    });
                    renderMap();
                }
            });
        }

        // 绑定界面控件事件
        function setupEventListeners() {
            const speciesFilter = document.getElementById('speciesFilter');
            const pcfMin = document.getElementById('pcfMin');
            const pcfMax = document.getElementById('pcfMax');
            const pcfMinValue = document.getElementById('pcfMinValue');
            const pcfMaxValue = document.getElementById('pcfMaxValue');
            const colorToggleBtn = document.getElementById('colorToggleBtn');
            const locationBtn = document.getElementById('locationBtn');
            const exportBtn = document.getElementById('exportBtn');

            speciesFilter.addEventListener('change', renderMap);
            
            pcfMin.addEventListener('input', function(e) {
                if (parseFloat(pcfMin.value) > parseFloat(pcfMax.value)) pcfMax.value = pcfMin.value;
                pcfMinValue.textContent = parseFloat(pcfMin.value).toFixed(2);
                pcfMaxValue.textContent = parseFloat(pcfMax.value).toFixed(2);
                renderMap();
            });
            
            pcfMax.addEventListener('input', function(e) {
                if (parseFloat(pcfMax.value) < parseFloat(pcfMin.value)) pcfMin.value = pcfMax.value;
                pcfMinValue.textContent = parseFloat(pcfMin.value).toFixed(2);
                pcfMaxValue.textContent = parseFloat(pcfMax.value).toFixed(2);
                renderMap();
            });

            colorToggleBtn.addEventListener('click', function() {
                isColorGradientMode = !isColorGradientMode;
                this.classList.toggle('active');
                renderMap();
            });

            exportBtn.addEventListener('click', exportToCSV);

            locationBtn.addEventListener('click', function() {
                if (!navigator.geolocation) {
                    alert("Your browser doesn't support geolocation.");
                    return;
                }
                let originalText = this.innerHTML;
                this.innerHTML = "⏳ Locating...";
                
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        locationBtn.innerHTML = originalText;
                        let lat = position.coords.latitude;
                        let lon = position.coords.longitude;
                        
                        if (userLocationMarker) map.removeLayer(userLocationMarker);
                        
                        userLocationMarker = L.circleMarker([lat, lon], {
                            radius: 5, fillColor: "#007bff", color: "#ffffff", weight: 2, opacity: 1, fillOpacity: 1, zIndexOffset: 1000
                        }).addTo(map);
                        
                        userLocationMarker.bindTooltip("You are here").openTooltip();
                        map.flyTo([lat, lon], 14, { duration: 1.5 });
                    }, 
                    function(error) {
                        locationBtn.innerHTML = originalText;
                        alert("Unable to retrieve location. Please check browser permissions.");
                    }, 
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            });
        }

        // 渲染地图
        function renderMap() {
            markersLayer.clearLayers();
            filteredDataForExport = [];
            
            let selectedSpecies = document.getElementById('speciesFilter').value;
            let minVal = parseFloat(document.getElementById('pcfMin').value);
            let maxVal = parseFloat(document.getElementById('pcfMax').value);
            let bounds = [];

            allData.forEach(row => {
                let matchSpecies = (selectedSpecies === "ALL" || row.stdSpecies === selectedSpecies);
                let matchPcf = (row.pcfValue >= minVal && row.pcfValue <= maxVal);

                if (matchSpecies && matchPcf) {
                    filteredDataForExport.push(row);
                    let structureNum = row['Structure Number1'] || 'N/A';
                    let displayPcf = row['Sawdust Progrqm PCF'] || '0';
                    let markerColor = getMarkerColor(row.pcfValue);
                    
                    let popupHTML = `
                        <div class="popup-content">
                            <div class="popup-header">Structure: ${structureNum}</div>
                            <b>Species:</b> ${row.stdSpecies}<br>
                            <b>Moisture:</b> ${row['Moisture %'] || 'N/A'}%<br>
                            <b>PCF Conc:</b> <span class="highlight" style="color:${isColorGradientMode ? markerColor : '#e74c3c'}">${displayPcf}</span>
                        </div>
                    `;

                    let marker = L.circleMarker([row.cleanLat, row.cleanLon], {
                        radius: 6, fillColor: markerColor, color: "#ffffff", weight: 1.5, opacity: 1, fillOpacity: 0.85
                    });

                    marker.on('mouseover', function (e) {
                        this.openTooltip();
                        this.setStyle({ radius: 9, weight: 2, fillOpacity: 1 });
                    });
                    marker.on('mouseout', function (e) {
                        this.closeTooltip();
                        this.setStyle({ radius: 6, weight: 1.5, fillOpacity: 0.85 });
                    });

                    marker.bindPopup(popupHTML);
                    marker.bindTooltip(`Pole: ${structureNum}`, { direction: 'top', offset: [0, -8] });
                    
                    markersLayer.addLayer(marker);
                    bounds.push([row.cleanLat, row.cleanLon]);
                }
            });

            if (bounds.length > 0 && !userLocationMarker) {
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
            }
        }

        // 导出 CSV
        function exportToCSV() {
            if (filteredDataForExport.length === 0) {
                alert("No data available to export based on current filters.");
                return;
            }
            const cleanData = filteredDataForExport.map(row => {
                const newRow = Object.assign({}, row);
                delete newRow.cleanLat; delete newRow.cleanLon; delete newRow.stdSpecies; delete newRow.pcfValue;
                return newRow;
            });
            const csvString = Papa.unparse(cleanData);
            const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Filtered_Line_7003_Export.csv";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
