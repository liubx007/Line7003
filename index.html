<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line 7003 Analytical Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-main: #f4f6f8;
            --bg-panel: #ffffff;
            --text-main: #202b36;
            --text-muted: #637381;
            --border-color: #dfe3e8;
            --primary: #0052cc;
            --primary-hover: #0043a6;
            --danger: #de3618;
            --success: #2ecc71; 
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.08);
            --radius: 4px;
        }

        /* Scaled down ~10% (Base font 13px) */
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; background-color: var(--bg-main); color: var(--text-main); overflow: hidden; font-size: 13px; }
        
        /* --- Login Overlay --- */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-main); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: var(--bg-panel); padding: 36px; border-radius: var(--radius); box-shadow: var(--shadow-md); text-align: center; width: 300px; border: 1px solid var(--border-color); }
        .login-box h3 { margin-top: 0; margin-bottom: 20px; font-size: 18px; font-weight: 600; color: var(--text-main); }
        .login-box input { width: 100%; padding: 10px 12px; margin-bottom: 14px; border: 1px solid var(--border-color); border-radius: var(--radius); font-size: 13px; box-sizing: border-box; outline: none; transition: all 0.2s; }
        .login-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 82, 204, 0.1); }
        .error-msg { color: var(--danger); font-size: 12px; margin-bottom: 14px; display: none; text-align: left; background: #ffe9e5; padding: 8px; border-radius: 4px; border: 1px solid #f9c2b7;}
        .login-box .btn-primary { width: 100%; justify-content: center; padding: 10px; font-size: 14px; }

        /* --- Main Layout --- */
        #mainDashboard { display: none; flex-direction: column; height: 100%; width: 100%; }
        
        /* --- Three-Row Header --- */
        #header { background-color: var(--bg-panel); border-bottom: 1px solid var(--border-color); box-shadow: var(--shadow-sm); z-index: 1000; display: flex; flex-direction: column; }
        
        .header-top { padding: 10px 20px; border-bottom: 1px solid var(--border-color); }
        .header-title { margin: 0; font-size: 16px; font-weight: 600; color: var(--text-main); letter-spacing: 0.3px; }
        
        .header-middle { padding: 8px 20px; display: flex; flex-wrap: nowrap; align-items: center; gap: 14px; border-bottom: 1px solid var(--border-color); overflow-x: auto; white-space: nowrap; }
        
        .header-bottom { padding: 6px 20px; display: flex; align-items: center; gap: 10px; background-color: #f9fafb; }
        
        /* --- Controls & Inputs --- */
        .control-group { display: flex; align-items: center; gap: 6px; }
        .control-label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
        .form-control { padding: 4px 8px; font-size: 12px; border-radius: var(--radius); border: 1px solid var(--border-color); background: var(--bg-panel); outline: none; transition: all 0.2s; }
        .form-control:focus { border-color: var(--primary); }
        input[type="text"].form-control { width: 130px; }
        
        /* Sliders & Direct Inputs */
        .slider-row { display: flex; align-items: center; gap: 6px; }
        input[type="range"] { cursor: pointer; accent-color: var(--primary); width: 80px; }
        
        /* Direct Number Input Styling */
        .pcf-input { width: 46px; padding: 3px 4px; border: 1px solid var(--border-color); border-radius: 3px; font-size: 12px; font-weight: 600; color: var(--primary); text-align: center; outline: none; transition: border-color 0.2s; background: var(--bg-main); }
        .pcf-input:focus { border-color: var(--primary); background: #fff; }
        .pcf-input::-webkit-inner-spin-button, .pcf-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .divider { width: 1px; height: 18px; background-color: var(--border-color); margin: 0 4px; }

        /* --- Buttons --- */
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 5px 12px; border-radius: var(--radius); font-weight: 500; font-size: 12px; cursor: pointer; transition: all 0.2s ease; border: 1px solid transparent; background: transparent; gap: 5px; }
        .btn-icon-only { padding: 5px 10px; font-size: 13px; } 
        
        .btn-primary { background-color: var(--primary); color: white; border-color: var(--primary); }
        .btn-primary:hover { background-color: var(--primary-hover); }
        
        .btn-outline { background-color: var(--bg-panel); color: var(--text-main); border-color: var(--border-color); }
        .btn-outline:hover { background-color: var(--bg-main); border-color: #c4cdd5; }
        .btn-outline.active { background-color: #ebf5ff; border-color: var(--primary); color: var(--primary); font-weight: 600; }

        /* --- Workspace & Views --- */
        #workspace { flex: 1; position: relative; overflow: hidden; display: flex; }
        .view-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; display: flex; flex-direction: column; }
        .view-panel.active { opacity: 1; pointer-events: auto; position: relative; }
        
        #map { width: 100%; height: 100%; background-color: #e3e9f0; }

        /* --- Summary Overlay on Map --- */
        #summaryPanel {
            position: absolute; bottom: 20px; left: 20px; background: rgba(255, 255, 255, 0.95);
            padding: 14px; border-radius: var(--radius); border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md); z-index: 999; width: 200px;
            backdrop-filter: blur(4px); transition: width 0.3s ease;
        }
        
        .summary-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 2px solid var(--border-color); padding-bottom: 8px; margin-bottom: 10px; transition: all 0.3s; }
        .summary-header.collapsed { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .summary-title { font-weight: 600; font-size: 13px; color: var(--text-main); margin: 0; } 
        .toggle-icon { font-size: 11px; color: var(--text-muted); transition: transform 0.3s; }
        .toggle-icon.collapsed { transform: rotate(180deg); }
        
        #summaryContent { overflow: hidden; transition: max-height 0.3s ease; }
        #summaryContent.collapsed { display: none; }

        .summary-item { margin-bottom: 6px; font-size: 12px; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; }
        .summary-val { font-weight: 600; font-size: 13px; color: var(--text-main); }
        
        .chart-container { margin-top: 12px; border-top: 1px dashed var(--border-color); padding-top: 8px; }
        .chart-title { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; text-align: center; }
        .mini-chart { display: flex; align-items: flex-end; justify-content: space-between; height: 36px; gap: 1px; }
        .chart-bar { flex: 1; background-color: var(--primary); border-radius: 2px 2px 0 0; min-height: 1px; transition: height 0.1s ease; opacity: 0.8; }
        .chart-axis { display: flex; justify-content: space-between; font-size: 9px; color: var(--text-muted); margin-top: 2px; }

        /* --- Table View --- */
        #tableContainer { width: 100%; height: 100%; overflow: auto; background: var(--bg-panel); padding: 0; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: left; font-size: 12px; }
        th { background-color: #f9fafb; padding: 10px 20px; font-weight: 600; color: var(--text-muted); position: sticky; top: 0; border-bottom: 1px solid var(--border-color); z-index: 10; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        td { padding: 10px 20px; border-bottom: 1px solid var(--bg-main); color: var(--text-main); transition: background-color 0.1s; }
        tbody tr:hover td { background-color: #f4f6f8; }
        .val-danger { color: var(--danger); font-weight: 600; }

        /* --- Map Popups --- */
        .leaflet-popup-content-wrapper { border-radius: var(--radius); box-shadow: var(--shadow-md); border: 1px solid var(--border-color); padding: 3px; }
        .popup-content { font-size: 12px; line-height: 1.5; color: var(--text-main); min-width: 180px; }
        .popup-header { border-bottom: 1px solid var(--border-color); padding-bottom: 6px; margin-bottom: 6px; font-weight: 600; font-size: 13px; color: var(--primary); }
        .leaflet-tooltip { border-radius: 2px; border: 1px solid #ccc; font-weight: 600; font-size: 11px; padding: 2px 5px;}
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h3>System Authorization</h3>
            <input type="password" id="passwordInput" placeholder="Enter Access Code">
            <div id="errorMsg" class="error-msg">Invalid access code. Please verify.</div>
            <button class="btn btn-primary" id="loginBtn">Authenticate</button>
        </div>
    </div>

    <div id="mainDashboard">
        
        <div id="header">
            <div class="header-top">
                <h2 class="header-title">Line 7003 Analytical Dashboard</h2>
            </div>
            
            <div class="header-middle">
                <div class="control-group">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search Pole ID">
                    <button class="btn btn-outline btn-icon-only" id="searchBtn" title="Search Pole"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>

                <div class="divider"></div>

                <div class="control-group">
                    <span class="control-label">Species</span>
                    <select id="speciesFilter" class="form-control">
                        <option value="ALL">All Species</option>
                        <option value="Red Pine">Red Pine</option>
                        <option value="West Red Cedar">West Red Cedar</option>
                        <option value="South Yellow Pine">South Yellow Pine</option>
                        <option value="D.Fir">D.Fir</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="divider"></div>
                
                <div class="control-group">
                    <div class="slider-row">
                        <span class="control-label">Min</span>
                        <input type="range" id="pcfMin" min="0" max="1.5" step="0.01" value="0.00">
                        <input type="number" id="pcfMinInput" class="pcf-input" min="0" max="1.5" step="0.01" value="0.00">
                    </div>
                </div>
                <div class="control-group">
                    <div class="slider-row">
                        <span class="control-label">Max</span>
                        <input type="range" id="pcfMax" min="0" max="1.5" step="0.01" value="1.50">
                        <input type="number" id="pcfMaxInput" class="pcf-input" min="0" max="1.5" step="0.01" value="1.50">
                    </div>
                </div>

                <div class="divider"></div>

                <button class="btn btn-outline" id="colorToggleBtn"><i class="fa-solid fa-palette"></i> Gradient</button>
                <button class="btn btn-outline" id="barChartBtn"><i class="fa-solid fa-chart-column"></i> 3D Bar</button>
                <button class="btn btn-outline" id="heatMapBtn"><i class="fa-solid fa-fire"></i> Heatmap</button>
                
                <button class="btn btn-outline btn-icon-only" id="resetBtn" title="Reset All Filters & Views" style="margin-left: 4px;"><i class="fa-solid fa-rotate-right"></i></button>
            </div>

            <div class="header-bottom">
                <button class="btn btn-outline btn-icon-only" id="tableViewBtn" title="Table View"><i class="fa-solid fa-table"></i></button>
                <button class="btn btn-outline btn-icon-only" id="locationBtn" title="Get My Location"><i class="fa-solid fa-location-crosshairs"></i></button>
                <button class="btn btn-primary btn-icon-only" id="exportBtn" title="Export CSV Data"><i class="fa-solid fa-file-csv"></i></button>
            </div>
        </div>

        <div id="workspace">
            <div id="mapView" class="view-panel active">
                <div id="map"></div>
                <div id="summaryPanel">
                    <div class="summary-header" id="summaryHeader" title="Click to collapse/expand">
                        <h4 class="summary-title">Data Summary</h4> 
                        <i class="fa-solid fa-chevron-down toggle-icon" id="summaryToggleIcon"></i>
                    </div>

                    <div id="summaryContent">
                        <div class="summary-item">Total Poles <span class="summary-val" id="sumTotal">0</span></div>
                        <div class="summary-item">Average PCF <span class="summary-val" id="sumAvg">0.00</span></div>
                        
                        <div class="chart-container">
                            <div class="chart-title">PCF Distribution</div>
                            <div class="mini-chart" id="miniChart"></div>
                            <div class="chart-axis">
                                <span>0.0</span>
                                <span>PCF</span>
                                <span>>1.5</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tableView" class="view-panel">
                <div id="tableContainer">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th>Pole ID</th>
                                <th>Wood Species</th>
                                <th>Moisture (%)</th>
                                <th>Preservative</th>
                                <th>PCF Conc.</th>
                                <th>Coordinates</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // Security Settings
        const CORRECT_PASSWORD = "7003"; 
        // ==========================================

        const loginOverlay = document.getElementById('loginOverlay');
        const mainDashboard = document.getElementById('mainDashboard');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');

        function attemptLogin() {
            if (passwordInput.value === CORRECT_PASSWORD) {
                loginOverlay.style.display = 'none';
                mainDashboard.style.display = 'flex';
                initializeDashboard(); 
            } else {
                errorMsg.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        loginBtn.addEventListener('click', attemptLogin);
        passwordInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') attemptLogin(); });

        let map, markersLayer, heatLayer = null, userLocationMarker = null;
        let allData = [];
        let filteredData = [];
        let markerRegistry = {}; 
        
        let isColorMode = false;
        let isBarMode = false;
        let isHeatMode = false;
        let isTableMode = false;
        let isInitialLoad = true; 

        function initializeDashboard() {
            map = L.map('map').setView([45.5, -62.0], 9);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors', maxZoom: 19
            }).addTo(map);

            markersLayer = L.layerGroup().addTo(map);
            loadData(); 
            setupEventListeners();
        }

        function cleanCoord(str) {
            if (!str) return null;
            let val = String(str).toUpperCase().trim();
            let mult = (val.includes('S') || val.includes('W')) ? -1 : 1;
            let match = val.match(/-?\d+\.\d+/);
            if (match) {
                let n = parseFloat(match[0]);
                if (n > 0 && mult === -1) n = n * -1;
                return n;
            }
            return null;
        }

        function standardizeSpecies(s) {
            if (!s) return 'Other';
            s = s.trim().toUpperCase();
            if (['RD', 'RP', 'D', 'RED PINE'].includes(s)) return 'Red Pine';
            if (['WRC', 'WRC?', 'CEDER', 'CEDAR'].includes(s)) return 'West Red Cedar';
            if (['YP', 'SYP', 'SOUTH YELLOW PINE'].includes(s)) return 'South Yellow Pine';
            if (['DF', 'D.FIR'].includes(s)) return 'D.Fir';
            return 'Other';
        }

        function getMarkerColor(pcf) {
            if (!isColorMode && !isBarMode) return "#0052cc"; 
            if (pcf <= 0) return "#919eab"; 
            let ratio = Math.min(pcf, 0.5) / 0.5;
            let hue = 60 - (ratio * 60); 
            return `hsl(${hue}, 100%, 45%)`;
        }

        function parsePoleId(idStr) {
            let match = idStr.match(/(\d+)(?:\s*\(\s*(\d+)\s*\))?/);
            if (!match) return [999999, 0];
            return [parseInt(match[1], 10), match[2] ? parseInt(match[2], 10) : 0];
        }

        function loadData() {
            Papa.parse("Line 7003 Final Data.csv", {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    let rawData = results.data;
                    let refLat = null, refLon = null;

                    rawData.forEach(row => {
                        if (String(row['Structure Number1']).trim() === '324 (2)') {
                            refLat = row['GPS Lat']; refLon = row['GPS Long'];
                        }
                    });

                    let coordOccurrences = {}; 

                    rawData.forEach(row => {
                        let structNum = String(row['Structure Number1']).trim();
                        if (structNum === '324 (3)' && refLat) {
                            row['GPS Lat'] = refLat; row['GPS Long'] = refLon;
                        }

                        let lat = cleanCoord(row['GPS Lat']);
                        let lon = cleanCoord(row['GPS Long']);
                        
                        let pcfStr = row['Sawdust Progrqm PCF'];
                        let pcfValue = 0;
                        if (pcfStr) {
                            let parsed = parseFloat(String(pcfStr).replace(/[^0-9.-]/g, ''));
                            if (!isNaN(parsed)) pcfValue = parsed;
                        }

                        if (pcfValue !== 0) {
                            row['Preservative3'] = 'Pentachlorophenol';
                        }
                        
                        let finalPreservative = row['Preservative3'] || 'N/A';

                        if (lat !== null && lon !== null) {
                            let key = `${lat.toFixed(5)},${lon.toFixed(5)}`;
                            if (coordOccurrences[key] !== undefined) {
                                coordOccurrences[key]++;
                                lat += 0.00006 * coordOccurrences[key]; 
                                lon += 0.00006 * coordOccurrences[key];
                            } else {
                                coordOccurrences[key] = 0;
                            }

                            allData.push({
                                original: row,
                                id: structNum,
                                lat: lat,
                                lon: lon,
                                species: standardizeSpecies(row['Wood Species2']),
                                pcf: pcfValue,
                                moisture: row['Moisture %'] || 'N/A',
                                preservative: finalPreservative
                            });
                        }
                    });
                    renderApplication();
                }
            });
        }

        function setupEventListeners() {
            const pcfMinSlider = document.getElementById('pcfMin');
            const pcfMaxSlider = document.getElementById('pcfMax');
            const pcfMinInput = document.getElementById('pcfMinInput');
            const pcfMaxInput = document.getElementById('pcfMaxInput');

            document.getElementById('speciesFilter').addEventListener('change', renderApplication);
            
            // ========== 安全的双向同步引擎 ==========
            function syncValues(source) {
                let minVal, maxVal;
                
                if (source === 'slider') {
                    minVal = parseFloat(pcfMinSlider.value);
                    maxVal = parseFloat(pcfMaxSlider.value);
                    if(minVal > maxVal) { maxVal = minVal; pcfMaxSlider.value = maxVal; }
                    pcfMinInput.value = minVal.toFixed(2);
                    pcfMaxInput.value = maxVal.toFixed(2);
                } else if (source === 'input') {
                    // 防呆：如果为空或非数字，给默认值
                    minVal = parseFloat(pcfMinInput.value);
                    if(isNaN(minVal)) minVal = 0;
                    
                    maxVal = parseFloat(pcfMaxInput.value);
                    if(isNaN(maxVal)) maxVal = 1.5;

                    if(minVal < 0) minVal = 0;
                    if(maxVal > 1.5) maxVal = 1.5;
                    if(minVal > maxVal) { maxVal = minVal; pcfMaxInput.value = maxVal.toFixed(2); }
                    
                    pcfMinSlider.value = minVal;
                    pcfMaxSlider.value = maxVal;
                }
                
                renderApplication();
            }

            pcfMinSlider.addEventListener('input', () => syncValues('slider'));
            pcfMaxSlider.addEventListener('input', () => syncValues('slider'));
            
            pcfMinInput.addEventListener('change', () => syncValues('input'));
            pcfMaxInput.addEventListener('change', () => syncValues('input'));
            // 支持在输入框按回车键立即生效
            pcfMinInput.addEventListener('keyup', (e) => { if(e.key === 'Enter') syncValues('input'); });
            pcfMaxInput.addEventListener('keyup', (e) => { if(e.key === 'Enter') syncValues('input'); });


            document.getElementById('summaryHeader').addEventListener('click', function() {
                const content = document.getElementById('summaryContent');
                const icon = document.getElementById('summaryToggleIcon');
                content.classList.toggle('collapsed');
                icon.classList.toggle('collapsed');
                this.classList.toggle('collapsed');
            });

            document.getElementById('resetBtn').addEventListener('click', function() {
                document.getElementById('speciesFilter').value = 'ALL';
                pcfMinSlider.value = '0.00';
                pcfMaxSlider.value = '1.50';
                pcfMinInput.value = '0.00';
                pcfMaxInput.value = '1.50';
                document.getElementById('searchInput').value = '';

                isColorMode = false;
                isBarMode = false;
                isHeatMode = false;
                document.getElementById('colorToggleBtn').classList.remove('active');
                document.getElementById('barChartBtn').classList.remove('active');
                document.getElementById('heatMapBtn').classList.remove('active');

                isInitialLoad = true;
                renderApplication();
            });

            document.getElementById('colorToggleBtn').addEventListener('click', function() {
                isColorMode = !isColorMode; this.classList.toggle('active'); renderApplication();
            });

            document.getElementById('barChartBtn').addEventListener('click', function() {
                isBarMode = !isBarMode; this.classList.toggle('active'); renderApplication();
            });

            document.getElementById('heatMapBtn').addEventListener('click', function() {
                isHeatMode = !isHeatMode; this.classList.toggle('active'); renderApplication();
            });

            document.getElementById('tableViewBtn').addEventListener('click', function() {
                isTableMode = !isTableMode;
                let mapView = document.getElementById('mapView');
                let tableView = document.getElementById('tableView');
                
                if (isTableMode) {
                    this.classList.add('active');
                    this.innerHTML = '<i class="fa-solid fa-map"></i>'; 
                    this.title = 'Map View';
                    mapView.classList.remove('active');
                    tableView.classList.add('active');
                } else {
                    this.classList.remove('active');
                    this.innerHTML = '<i class="fa-solid fa-table"></i>'; 
                    this.title = 'Table View';
                    tableView.classList.remove('active');
                    mapView.classList.add('active');
                    map.invalidateSize(); 
                }
            });

            document.getElementById('exportBtn').addEventListener('click', exportData);

            document.getElementById('searchBtn').addEventListener('click', searchPole);
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') searchPole();
            });

            document.getElementById('locationBtn').addEventListener('click', function() {
                if (!navigator.geolocation) { alert("Geolocation is not supported by your browser."); return; }
                if(isTableMode) document.getElementById('tableViewBtn').click();

                let originalHTML = this.innerHTML; 
                this.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; 
                
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        document.getElementById('locationBtn').innerHTML = originalHTML;
                        let lat = position.coords.latitude; let lon = position.coords.longitude;
                        if (userLocationMarker) map.removeLayer(userLocationMarker);
                        
                        userLocationMarker = L.circleMarker([lat, lon], { 
                            radius: 7, fillColor: "var(--success)", color: "#ffffff", weight: 2, opacity: 1, fillOpacity: 1, zIndexOffset: 1000 
                        }).addTo(map);
                        
                        userLocationMarker.bindTooltip("Current Location").openTooltip();
                        map.flyTo([lat, lon], 14, { duration: 1.5 });
                    }, 
                    function(error) { document.getElementById('locationBtn').innerHTML = originalHTML; alert("Unable to retrieve location. Please check browser permissions."); }, 
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            });
        }

        function searchPole() {
            let query = document.getElementById('searchInput').value.trim().toUpperCase();
            if (!query) return;

            let target = filteredData.find(d => d.id.toUpperCase().includes(query));
            if (target) {
                if (isTableMode) document.getElementById('tableViewBtn').click();
                if(markerRegistry[target.id]) {
                    let m = markerRegistry[target.id];
                    map.flyTo(m.getLatLng(), 18, {duration: 1.0});
                    setTimeout(() => m.openPopup(), 1000);
                }
            } else {
                alert("Pole ID not found in current filtered dataset.");
            }
        }

        function renderApplication() {
            filteredData = [];
            let selectedSpecies = document.getElementById('speciesFilter').value;
            
            // 安全读取数值，防止报错
            let minVal = parseFloat(document.getElementById('pcfMin').value);
            if(isNaN(minVal)) minVal = 0;
            
            let maxVal = parseFloat(document.getElementById('pcfMax').value);
            if(isNaN(maxVal)) maxVal = 1.5;
            
            let isAtMax = (maxVal >= 1.5);
            let totalPcf = 0;

            allData.forEach(data => {
                let matchSp = (selectedSpecies === "ALL" || data.species === selectedSpecies);
                let matchPcf = (data.pcf >= minVal && (isAtMax ? true : data.pcf <= maxVal));

                if (matchSp && matchPcf) {
                    filteredData.push(data);
                    totalPcf += data.pcf;
                }
            });

            renderMap();
            renderTable();

            let count = filteredData.length;
            document.getElementById('sumTotal').textContent = count;
            document.getElementById('sumAvg').textContent = count > 0 ? (totalPcf / count).toFixed(3) : "0.00";
            
            renderMiniChart();
        }

        function renderMiniChart() {
            let binCount = 15;
            let bins = new Array(binCount).fill(0);
            let maxPcfScale = 1.5;
            
            filteredData.forEach(d => {
                let binIdx = Math.floor((d.pcf / maxPcfScale) * binCount);
                if (binIdx >= binCount) binIdx = binCount - 1; 
                if (binIdx < 0) binIdx = 0;
                bins[binIdx]++;
            });

            let maxFreq = Math.max(...bins, 1); 
            let chartContainer = document.getElementById('miniChart');
            chartContainer.innerHTML = '';

            bins.forEach((count, idx) => {
                let heightPct = (count / maxFreq) * 100;
                let binStart = ((idx / binCount) * maxPcfScale).toFixed(1);
                
                let bar = document.createElement('div');
                bar.className = 'chart-bar';
                bar.style.height = heightPct + '%';
                bar.title = `PCF ~${binStart}: ${count} poles`;
                
                if (isColorMode && parseFloat(binStart) >= 0.5) {
                    bar.style.backgroundColor = 'var(--danger)';
                }

                chartContainer.appendChild(bar);
            });
        }

        function renderMap() {
            markersLayer.clearLayers();
            if (heatLayer) map.removeLayer(heatLayer);
            markerRegistry = {};
            
            let bounds = [];
            let heatData = [];

            filteredData.forEach(data => {
                let markerColor = getMarkerColor(data.pcf);
                
                let popupHTML = `
                    <div class="popup-content">
                        <div class="popup-header">Pole ID: ${data.id}</div>
                        <div style="margin-bottom: 2px;"><b>Species:</b> ${data.species}</div>
                        <div style="margin-bottom: 2px;"><b>Preservative:</b> ${data.preservative}</div>
                        <div style="margin-bottom: 2px;"><b>Moisture:</b> ${data.moisture}%</div>
                        <div><b>PCF Concentration:</b> <span style="font-weight:600; color:${data.pcf > 0.5 ? '#de3618' : '#202b36'}">${data.pcf}</span></div>
                    </div>
                `;

                let marker;
                if (isBarMode && !isHeatMode) {
                    let h = Math.max((data.pcf / 1.0) * 80, 5); 
                    let barHtml = `
                        <div style="width:10px; height:${h}px; background-color:${markerColor}; 
                        box-shadow: 2px 2px 4px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.6); border-bottom: 1px solid #333;"></div>
                    `;
                    let barIcon = L.divIcon({ html: barHtml, className: '', iconSize: [10, h], iconAnchor: [5, h], popupAnchor: [0, -h] });
                    marker = L.marker([data.lat, data.lon], { icon: barIcon });
                } else if (!isHeatMode) {
                    marker = L.circleMarker([data.lat, data.lon], { radius: 5, fillColor: markerColor, color: "#fff", weight: 1, opacity: 1, fillOpacity: 0.85 });
                    marker.on('mouseover', function () { this.setStyle({ radius: 7, weight: 2 }); });
                    marker.on('mouseout', function () { this.setStyle({ radius: 5, weight: 1 }); });
                }

                if (!isHeatMode) {
                    marker.bindPopup(popupHTML);
                    marker.bindTooltip(data.id, { direction: 'top', offset: [0, isBarMode ? -10 : -5] });
                    markersLayer.addLayer(marker);
                    markerRegistry[data.id] = marker;
                }

                bounds.push([data.lat, data.lon]);
                
                if (isHeatMode) {
                    let intensity = Math.min(data.pcf / 1.0, 1.0);
                    heatData.push([data.lat, data.lon, intensity]);
                }
            });

            if (isHeatMode && heatData.length > 0) {
                heatLayer = L.heatLayer(heatData, {
                    radius: 18, blur: 12, maxZoom: 14, 
                    gradient: {0.2: '#0052cc', 0.4: '#00a3bf', 0.6: '#57d9a3', 0.8: '#ffc400', 1.0: '#de3618'}
                }).addTo(map);
            }

            if (isInitialLoad && bounds.length > 0) {
                map.fitBounds(bounds, { padding: [30, 30], maxZoom: 15 });
                isInitialLoad = false; 
            }
        }

        function renderTable() {
            let tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            let sortedData = [...filteredData].sort((a, b) => {
                let aParsed = parsePoleId(a.id);
                let bParsed = parsePoleId(b.id);
                if (aParsed[0] !== bParsed[0]) return aParsed[0] - bParsed[0];
                return aParsed[1] - bParsed[1];
            });

            sortedData.forEach(data => {
                let tr = document.createElement('tr');
                tr.style.cursor = 'pointer';
                tr.onclick = function() {
                    document.getElementById('tableViewBtn').click(); 
                    if(markerRegistry[data.id]) {
                        map.flyTo([data.lat, data.lon], 17, {duration: 0.8});
                        setTimeout(() => markerRegistry[data.id].openPopup(), 800);
                    }
                };
                
                let pcfStyle = data.pcf > 0.5 ? 'class="val-danger"' : '';
                
                tr.innerHTML = `
                    <td style="font-weight:600; color:var(--primary);">${data.id}</td>
                    <td>${data.species}</td>
                    <td>${data.moisture}</td>
                    <td>${data.preservative}</td>
                    <td ${pcfStyle}>${data.pcf.toFixed(3)}</td>
                    <td style="color:var(--text-muted); font-size: 10px;">${data.lat.toFixed(5)}, ${data.lon.toFixed(5)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function exportData() {
            if (filteredData.length === 0) return alert("No data to export.");
            let exportArr = filteredData.map(d => d.original);
            let csv = Papa.unparse(exportArr);
            let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Line_7003_Export.csv";
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
    </script>
</body>
</html>
